<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decider Pro | Fixed Logic</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #ec4899;
            --bg: #0a0a0c;
            --card: #18181b;
            --text: #ffffff;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .app-card {
            background: var(--card);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #27272a;
        }

        .wheel-box {
            position: relative;
            margin: 30px auto;
            width: 320px;
            height: 320px;
        }

        #canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #27272a;
            transition: transform 5s cubic-bezier(0.15, 0, 0.1, 1);
        }

        /* The Pointer at 12 o'clock */
        .ticker {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 40px;
            background: #facc15;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 20;
        }

        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        
        input {
            flex: 1;
            background: #27272a;
            border: 1px solid #3f3f46;
            padding: 12px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            transition: 0.2s;
        }

        #add-btn { background: var(--primary); color: white; padding: 0 20px; }

        #spin-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 16px;
            width: 100%;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .tag {
            background: #27272a;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        #result-display {
            margin-top: 20px;
            font-size: 1.6rem;
            color: #facc15;
            font-weight: 800;
            height: 2rem;
        }
    </style>
</head>
<body>

    <div class="app-card">
        <h2>DECIDER PRO</h2>
        
        <div class="input-row">
            <input type="text" id="item-input" placeholder="Enter option...">
            <button id="add-btn">ADD</button>
        </div>

        <div class="tags" id="tags-container"></div>

        <div class="wheel-box">
            <div class="ticker"></div>
            <canvas id="canvas" width="600" height="600"></canvas>
        </div>

        <button id="spin-btn">SPIN WHEEL</button>
        <div id="result-display"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const input = document.getElementById('item-input');
        const tagsContainer = document.getElementById('tags-container');
        const spinBtn = document.getElementById('spin-btn');
        const resultDisplay = document.getElementById('result-display');

        let options = ["Study", "Eat", "Sleep", "Code", "Gym"];
        let isSpinning = false;
        let currentRotation = 0;
        const colors = ['#8b5cf6', '#ec4899', '#3b82f6', '#10b981', '#f59e0b', '#ef4444'];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTick() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function draw() {
            const size = canvas.width;
            const center = size / 2;
            const sliceAngle = (2 * Math.PI) / options.length;

            ctx.clearRect(0, 0, size, size);

            options.forEach((text, i) => {
                const angle = i * sliceAngle;
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(center, center);
                ctx.arc(center, center, center, angle, angle + sliceAngle);
                ctx.lineTo(center, center);
                ctx.fill();

                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(angle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 28px Inter";
                ctx.fillText(text.toUpperCase(), center - 40, 10);
                ctx.restore();
            });
        }

        function updateUI() {
            tagsContainer.innerHTML = '';
            options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'tag';
                div.innerHTML = `${opt} <span style="cursor:pointer;margin-left:5px" onclick="removeOpt(${idx})">×</span>`;
                tagsContainer.appendChild(div);
            });
            draw();
        }

        window.removeOpt = (i) => {
            options.splice(i, 1);
            updateUI();
        };

        document.getElementById('add-btn').onclick = () => {
            if (input.value.trim()) {
                options.push(input.value.trim());
                input.value = '';
                updateUI();
            }
        };

        spinBtn.onclick = () => {
            if (isSpinning || options.length < 2) return;
            isSpinning = true;
            resultDisplay.innerText = "Choosing...";
            
            const randomSpin = 2000 + Math.random() * 2000; 
            currentRotation += randomSpin;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // Tick sound logic
            let lastTick = 0;
            const sliceDeg = 360 / options.length;
            const start = performance.now();
            
            function doTicks(now) {
                const elapsed = now - start;
                const progress = elapsed / 5000;
                if (progress >= 1) return;

                const easeOut = 1 - Math.pow(1 - progress, 3);
                const currentDeg = easeOut * randomSpin;
                
                if (Math.floor(currentDeg / sliceDeg) > lastTick) {
                    playTick();
                    lastTick++;
                }
                requestAnimationFrame(doTicks);
            }
            requestAnimationFrame(doTicks);

            setTimeout(() => {
                isSpinning = false;
                
                // --- THE LOGIC FIX ---
                // 1. Get the final normalized rotation (0-360)
                const finalRotation = currentRotation % 360;
                
                // 2. The wheel rotates clockwise. The arrow is at the top (270° in canvas math).
                // We calculate which slice is currently under that 270° point.
                const sliceSize = 360 / options.length;
                const winningIndex = Math.floor((360 - (finalRotation % 360) + 270) % 360 / sliceSize);
                
                resultDisplay.innerText = options[winningIndex].toUpperCase();
                
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 }
                });
            }, 5000);
        };

        updateUI();
    </script>
</body>
</html>
